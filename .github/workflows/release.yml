name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag to publish, for example v2.0.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release-assets:
    name: Build ${{ matrix.mcVer }} ${{ matrix.module }}
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release_version.outputs.tag }}
      release_version: ${{ steps.release_version.outputs.value }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - mcVer: 1.20.1
            module: forge
            java: '17'
            asset_suffix: mc1.20.1-forge
          - mcVer: 1.21.1
            module: neoforge
            java: '21'
            asset_suffix: mc1.21.1-neoforge

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: gradle

      - name: Derive release version
        id: release_version
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag_name="${{ inputs.release_tag }}"
          else
            tag_name="${GITHUB_REF_NAME}"
          fi
          release_version="${tag_name#v}"
          echo "tag=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "value=${release_version}" >> "${GITHUB_OUTPUT}"

      - name: Build release jar
        run: ./gradlew -PmcVer=${{ matrix.mcVer }} -PreleaseVersion=${{ steps.release_version.outputs.value }} clean build

      - name: Normalize release asset name
        shell: bash
        run: |
          mkdir -p release-assets
          src="$(find "${{ matrix.module }}/build/libs" -maxdepth 1 -type f -name 'bedtimeban-*.jar' ! -name '*-sources.jar' | head -n 1)"
          test -n "${src}"
          cp "${src}" "release-assets/bedtimeban-v${{ steps.release_version.outputs.value }}-${{ matrix.asset_suffix }}.jar"

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: bedtimeban-release-${{ matrix.asset_suffix }}
          path: release-assets/bedtimeban-v${{ steps.release_version.outputs.value }}-${{ matrix.asset_suffix }}.jar
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-release-assets

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: bedtimeban-release-*
          merge-multiple: true

      - name: Verify release assets
        shell: bash
        run: |
          ls -1 release-assets
          test -f "release-assets/bedtimeban-v${{ needs.build-release-assets.outputs.release_version || '' }}-mc1.20.1-forge.jar"
          test -f "release-assets/bedtimeban-v${{ needs.build-release-assets.outputs.release_version || '' }}-mc1.21.1-neoforge.jar"

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag_name="${{ needs.build-release-assets.outputs.release_tag }}"
          release_version="${{ needs.build-release-assets.outputs.release_version }}"
          gh release create "${tag_name}" \
            "release-assets/bedtimeban-v${release_version}-mc1.20.1-forge.jar" \
            "release-assets/bedtimeban-v${release_version}-mc1.21.1-neoforge.jar" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Bedtime Ban ${tag_name}" \
            --generate-notes
